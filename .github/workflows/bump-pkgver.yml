name: Bump pkgver from upstream

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: bump-pkgver
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: archlinux:latest
    steps:
      - name: Install prerequisites
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm --needed git base-devel sudo
          useradd -m -G wheel -s /bin/bash builder
          printf '%s\n' 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4

      - name: Sync sources, refresh pkgver, and update .SRCINFO
        id: bump
        run: |
          set -euo pipefail
          cp -a "${GITHUB_WORKSPACE}/aur" /home/builder/pkg
          chown -R builder:builder /home/builder/pkg
          sudo -u builder bash -euxo pipefail -c 'cd ~/pkg && makepkg -od --noconfirm --noprogressbar'

          NEW_PKGVER="$(sudo -u builder bash -c 'cd ~/pkg/src/calls && git describe --long --tags --abbrev=7' | sed 's/^v//; s/\([^-]*-g\)/r\1/; s/-/./g')"
          OLD_PKGVER="$(grep '^pkgver=' /home/builder/pkg/PKGBUILD | head -1 | cut -d= -f2)"

          {
            echo "new_pkgver=${NEW_PKGVER}"
            echo "old_pkgver=${OLD_PKGVER}"
          } >> "$GITHUB_OUTPUT"

          if [ "${NEW_PKGVER}" = "${OLD_PKGVER}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          sudo -u builder sed -i "s|^pkgver=.*|pkgver=${NEW_PKGVER}|" /home/builder/pkg/PKGBUILD
          sudo -u builder bash -euxo pipefail -c 'cd ~/pkg && makepkg -d --printsrcinfo' > "${GITHUB_WORKSPACE}/aur/.SRCINFO"
          cp /home/builder/pkg/PKGBUILD "${GITHUB_WORKSPACE}/aur/PKGBUILD"

      - name: Create pull request
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(aur): bump pkgver to ${{ steps.bump.outputs.new_pkgver }}"
          title: "Bump pkgver to ${{ steps.bump.outputs.new_pkgver }}"
          body: |
            Automated bump using the same `pkgver()` logic as the PKGBUILD ([GNOME/calls](https://gitlab.gnome.org/GNOME/calls) `git describe`).

            | | Version |
            |---|---|
            | Previous | `${{ steps.bump.outputs.old_pkgver }}` |
            | New | `${{ steps.bump.outputs.new_pkgver }}` |
          branch: automated/pkgver-${{ steps.bump.outputs.new_pkgver }}
          delete-branch: true
